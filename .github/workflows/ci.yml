name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend files
        run: |
          python -m py_compile backend/api_server.py test/test_backend_flow.py

      - name: Initialize database
        run: |
          python setup_db.py

      - name: Run full functionality test
        run: |
          python test/test_backend_flow.py