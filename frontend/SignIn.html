<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Job Radar - Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page login-page">

    <main class="login-main">

      <section class="login-card">

        <a href="index.html" class="login-logo">
          Job Radar
        </a>

        <h1>Login</h1>

        <p class="subtitle">
          Welcome back to your career radar.
        </p>

        <form>

          <label>Email Address</label>

          <div class="input-box">
            <span>✉</span>

            <input
              id="emailInput"
              type="email"
              placeholder="name@company.com"
            >
          </div>

          <label>Password</label>

          <div class="input-box">
            <span>◧</span>

            <input
              id="passwordInput"
              type="text"
              maxlength="8"
              placeholder="Password must be 8 characters"
            >
          </div>

          <label>Login Role</label>

          <div class="input-box">
            <span>◎</span>

            <select id="roleInput" class="login-role-select">
              <option value="candidate">Candidate</option>
              <option value="employer">Employer</option>
            </select>
          </div>

          <button
            type="button"
            onclick="loginUser()"
          >
            Login
          </button>

          <div class="divider"></div>

          <p class="signup-text">
            Don't have an account?

            <a href="candidate-signup.html">
              Sign up
            </a>
          </p>

        </form>

      </section>

    </main>

  </div>

  <script>
    function loginUser() {
      const email =
        document.getElementById("emailInput").value.trim();

      const password =
        document.getElementById("passwordInput").value.trim();

      const role =
        document.getElementById("roleInput").value;

      if (!email || !password) {
        alert("Please enter your email and password.");
        return;
      }

      fetch("http://localhost:5001/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          email: email,
          password: password,
          role: role
        })
      })

      .then(response => response.json())

      .then(data => {

        if (data.status === "success") {

          localStorage.setItem("loginRole", role);
          localStorage.setItem("membership", data.membership);

          if (role === "employer") {
            window.location.href = "employer-index.html";
          } else {
            window.location.href = "jobseeker-index.html";
          }

        } else {

          alert(data.message || "Login failed.");

        }

      })

      .catch(error => {

        console.error("Login error:", error);

        alert("Cannot connect to backend. Please make sure Flask is running.");

      });
    }
  </script>

</body>

</html>
