<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Home Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <header class="navbar">

      <div class="logo">
        <span>Job</span>
        <strong>Radar</strong>
      </div>

      <div class="nav-right">

        <a href="employer-profile.html">
          <div class="user-icon"></div>
        </a>

        <div class="user-name-box" id="employerName">
          Employer
        </div>

      </div>

    </header>

    <section class="search-area">

      <select class="search-filter" name="searchType">
        <option value="skill">Skill</option>
        <option value="candidate">Candidate Name</option>
        <option value="position">Position</option>
        <option value="location">Location</option>
      </select>

      <input
        class="search-input"
        type="text"
        placeholder="Enter skill, candidate name or position"
      >

      <button class="search-btn">
        Search
      </button>

    </section>

    <main class="main-content">

      <section class="recommended-section">

        <div class="section-header">

          <h1>Recommended Candidates</h1>

          <p class="member-note">
            Free employers can view up to 10 candidate recommendations.
            Members can view unlimited candidate recommendations.
          </p>

        </div>

        <div class="recommend-scroll" id="recommendList">

        </div>

      </section>

      <aside class="side-panel">

        <section class="saved-section">

          <h3>Employer Search History</h3>

          <div class="history-box" id="historyList">

          </div>

        </section>

      </aside>

    </main>

  </div>

  <script>
    const savedEmployerName = localStorage.getItem("employerName");

    if (savedEmployerName && savedEmployerName.trim() !== "") {
      document.getElementById("employerName").innerText = savedEmployerName;
    }
  </script>

  <script src="script.js"></script>

</body>

</html>
