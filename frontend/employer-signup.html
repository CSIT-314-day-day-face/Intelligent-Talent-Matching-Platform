<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Employer Sign Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="signup-page">

    <!-- LOGO -->

    <a class="signup-logo">
      Job Radar
    </a>

    <!-- CARD -->

    <main class="signup-main">

      <section class="signup-card">

        <h1>Employer Sign Up</h1>

        <form>

          <!-- COMPANY -->

          <label>Company Name</label>

          <div class="signup-input">

            <span>⌂</span>

            <input
              type="text"
              placeholder="e.g. Acme Corp"
            >

          </div>

          <!-- EMAIL -->

          <label>Work Email</label>

          <div class="signup-input">

            <span>✉</span>

            <input
              type="email"
              placeholder="name@company.com"
            >

          </div>

          <!-- PASSWORD -->

          <label>Password</label>

          <div class="signup-input">

            <span>◧</span>

            <input
              type="text"
              maxlength="8"
              placeholder="Min. 8 characters"
            >

          </div>

          <!-- BUTTON -->

          <button
            type="button"
            onclick="window.location.href='employer-index.html'"
          >
            Sign Up
          </button>

          <!-- LOGIN -->

          <p class="login-link">

            Already have an account?

            <a href="SignIn.html">
              Log In
            </a>

          </p>

          <!-- SWITCH -->

          <a
            href="candidate-signup.html"
            class="switch-link"
          >
            Register as Candidate →
          </a>

        </form>

      </section>

    </main>

    <!-- FOOTER -->

    <footer class="signup-footer">

      <div>

        <strong>Job Radar</strong>

        <p>
          © 2024 Job Radar. All rights reserved.
        </p>

      </div>

      <div class="signup-footer-links">

        <a href="#">Privacy Policy</a>

        <a href="#">Terms of Service</a>

        <a href="#">About Us</a>

      </div>

    </footer>

  </div>

</body>

</html>
