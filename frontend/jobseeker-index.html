<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Job Seeker Home Page</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <header class="navbar">

      <div class="logo">
        <span>Job</span>
        <strong>Radar</strong>
      </div>

      <div class="nav-right">

        <a href="candidate-profile.html">
          <div class="user-icon"></div>
        </a>

        <div class="user-name-box" id="userName">
          User
        </div>

      </div>

    </header>

    <section class="search-area">
      <select class="search-filter" name="searchType">
        <option value="location">Location</option>
        <option value="salary">Salary</option>
        <option value="company">Company Name</option>
        <option value="position">Job Position</option>
      </select>

    <input
      class="search-input"
      type="text"
      placeholder="Enter company name or Job Position"
  >

    <button class="search-btn">
       Search
    </button>
    </section>

    <main class="main-content">

      <section class="recommended-section">

        <div class="section-header">

          <h1>Recommended</h1>

          <p class="member-note">
            Free users can view up to 10 recommendations.
            Members can view unlimited recommendations.
          </p>

        </div>

        <div class="recommend-scroll" id="recommendList">

        </div>

      </section>

      <aside class="side-panel">

        <section class="saved-section">

          <h3>Search History</h3>

          <div class="history-box" id="historyList">

          </div>

        </section>

      </aside>

    </main>

  </div>

  <script>
    const savedName = localStorage.getItem("userName");

    if (savedName && savedName.trim() !== "") {
      document.getElementById("userName").innerText = savedName;
    }
  </script>

  <script src="script.js"></script>

</body>

</html>
