<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Job Radar - Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page login-page">

    <main class="login-main">

      <section class="login-card">

        <a href="index.html" class="login-logo" onclick="goHome(event)">
          Job Radar
        </a>

        <h1>Login</h1>

        <p class="subtitle">
          Welcome back to your career radar.
        </p>

        <form>

          <label>Email Address</label>

          <div class="input-box">
            <span>✉</span>

            <input
              id="emailInput"
              type="email"
              placeholder="name@company.com"
            >
          </div>

          <label>Password</label>

          <div class="input-box">
            <span>◧</span>

            <input
              id="passwordInput"
              type="password"
              minlength="8"
              placeholder="Password must be at least 8 characters"
            >
          </div>

          <label>Login Role</label>

          <div class="input-box">
            <span>◎</span>

            <select id="roleInput" class="login-role-select">
              <option value="candidate">Candidate</option>
              <option value="employer">Employer</option>
            </select>
          </div>

          <button
            type="button"
            onclick="loginUser()"
          >
            Login
          </button>

          <div class="divider"></div>

          <p class="signup-text">
            Don't have an account?

            <a href="candidate-register.html">
              Sign up
            </a>
          </p>

        </form>

      </section>

    </main>

  </div>

  <script src="api.js"></script>
  <script>
    function loginUser() {
      const email =
        document.getElementById("emailInput").value.trim();

      const password =
        document.getElementById("passwordInput").value.trim();

      const role =
        document.getElementById("roleInput").value;

      if (!email || !password) {
        alert("Please enter your email and password.");
        return;
      }

      apiRequest("/login", {
        method: "POST",
        body: {
          email: email,
          password: password,
          role: role
        }
      })

      .then(data => {

        if (data.status === "success") {

          setLoginState(data, email, role);
          if (role === "employer") {
            window.location.href = "employer-home.html";
          } else {
            window.location.href = "candidate-home.html";
          }

        } else {

          alert(data.message || "Login failed.");

        }

      })

      .catch(error => {

        console.error("Login error:", error);

        const errorMessage = error && error.message ? error.message : "";
        const isConnectionError =
          errorMessage.includes("Failed to fetch") ||
          errorMessage.includes("NetworkError") ||
          errorMessage.includes("Load failed");

        alert(
          isConnectionError
            ? "Cannot connect to backend. Please make sure Flask is running."
            : errorMessage || "Login failed."
        );

      });
    }

    bindEnterKey([
      "#emailInput",
      "#passwordInput",
      "#roleInput"
    ], loginUser);
  </script>

</body>

</html>
