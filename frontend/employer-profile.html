<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Employer Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="employer-profile-page">

    <!-- NAVBAR -->

    <header class="employer-profile-navbar">

      <a
        href="employer-index.html"
        class="employer-profile-logo"
      >
        Job Radar
      </a>

      <strong
        class="employer-profile-name"
        id="profileName"
      >
        Guest
      </strong>

    </header>

    <!-- MAIN -->

    <main class="employer-profile-main">

      <!-- LEFT -->

      <section class="company-panel">

        <h2>
          <span>▣</span>
          Company Information
        </h2>

        <label>Your Name:</label>

        <input
          id="ownerNameInput"
          type="text"
          placeholder="e.g. Marcus Smith"
        >

        <label>Company Name:</label>

        <input
          id="companyNameInput"
          type="text"
          placeholder="e.g. Radar Tech Global"
        >

        <label>Company Location:</label>

        <input
          id="companyLocationInput"
          type="text"
          placeholder="e.g. Sydney, NSW"
        >

        <label>Email:</label>

        <input
          id="companyEmailInput"
          type="email"
          placeholder="e.g. name@company.com"
        >

        <button onclick="saveEmployerProfile()">
          Save Profile
        </button>

      </section>

      <!-- RIGHT -->

      <section class="published-panel">

        <div class="published-header">

          <h2>
            <span>●</span>
            Published Jobs
          </h2>

          <div class="published-actions">

            <!-- POST JOB -->

            <button
              class="post-job-header-btn"
              onclick="goToPostJob()"
            >
              + Post Job
            </button>

            <!-- VIP -->

            <button
              class="vip-btn"
              id="vipButton"
              onclick="openVipModal()"
            >
              VIP
            </button>

          </div>

        </div>

        <!-- JOB LIST -->

       <div
       id="publishedJobsList"
       class="published-jobs-list"
       >
      </div>

      </section>

    </main>

    <!-- FOOTER -->

    <footer class="employer-profile-footer">

      <div>

        <strong>Job Radar</strong>

        <p>
          © 2024 Job Radar. Precision matching for the modern workforce.
        </p>

      </div>

      <div class="employer-profile-footer-links">

        <a href="#">
          Privacy Policy
        </a>

        <a href="#">
          Terms of Service
        </a>

        <a href="#">
          Help Center
        </a>

        <a href="#">
          Contact
        </a>

      </div>

    </footer>

  </div>

  <!-- VIP MODAL -->

  <div
    class="vip-modal-overlay"
    id="vipModal"
  >

    <div class="vip-modal">

      <h2>
        Become a VIP Member?
      </h2>

      <p>
        VIP members can publish unlimited jobs
        and receive higher exposure.
      </p>

      <div class="vip-modal-actions">

        <button
          class="vip-confirm-btn"
          onclick="confirmVip()"
        >
          Confirm
        </button>

        <button
          class="vip-cancel-btn"
          onclick="closeVipModal()"
        >
          Cancel
        </button>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    const profileName =
      document.getElementById("profileName");

    const vipButton =
      document.getElementById("vipButton");

    const ownerNameInput =
      document.getElementById("ownerNameInput");

    const companyNameInput =
      document.getElementById("companyNameInput");

    const companyLocationInput =
      document.getElementById("companyLocationInput");

    const companyEmailInput =
      document.getElementById("companyEmailInput");

    let employerProfile =
      JSON.parse(
        localStorage.getItem("employerProfile")
      ) || {
        name: "",
        companyName: "",
        location: "",
        email: "",
        isVip: false
      };

    /* LOAD PROFILE */

    function loadEmployerProfile() {

      ownerNameInput.value =
        employerProfile.name;

      companyNameInput.value =
        employerProfile.companyName;

      companyLocationInput.value =
        employerProfile.location;

      companyEmailInput.value =
        employerProfile.email;

      profileName.textContent =
        employerProfile.name || "Guest";

      if (employerProfile.isVip === true) {

        vipButton.classList.add("vip-active");

      } else {

        vipButton.classList.remove("vip-active");

      }

    }

    /* SAVE PROFILE */

    function saveEmployerProfile() {

      employerProfile.name =
        ownerNameInput.value.trim();

      employerProfile.companyName =
        companyNameInput.value.trim();

      employerProfile.location =
        companyLocationInput.value.trim();

      employerProfile.email =
        companyEmailInput.value.trim();

      localStorage.setItem(
        "employerProfile",
        JSON.stringify(employerProfile)
      );

      loadEmployerProfile();

      alert("Profile saved successfully.");

    }

    /* GO TO POST JOB */

    function goToPostJob() {

      const jobs =
        JSON.parse(
          localStorage.getItem("publishedJobs")
        ) || [];

      if (
        employerProfile.isVip !== true &&
        jobs.length >= 10
      ) {

        alert(
          "Non-VIP employers can publish up to 10 jobs only."
        );

        return;

      }

      window.location.href =
        "post-job.html";

    }

    /* VIP */

    function openVipModal() {

      document
        .getElementById("vipModal")
        .style.display = "flex";

    }

    function closeVipModal() {

      document
        .getElementById("vipModal")
        .style.display = "none";

    }

    function confirmVip() {

      employerProfile.isVip = true;

      localStorage.setItem(
        "employerProfile",
        JSON.stringify(employerProfile)
      );

      loadEmployerProfile();

      closeVipModal();

    }

    /* LOAD JOBS */

    const jobsList =
      document.getElementById("publishedJobsList");

    const jobs =
      JSON.parse(
        localStorage.getItem("publishedJobs")
      ) || [];

    if (jobs.length === 0) {

      jobsList.innerHTML = `

        <div class="empty-job-box">

          <button
            class="empty-add-btn"
            onclick="goToPostJob()"
          >
            +
          </button>

        </div>

      `;

    } else {

      jobsList.innerHTML =
        jobs.map(job => `

          <article class="published-job-card">

            <div class="job-title-row">

              <h3>${job.title}</h3>

              <span class="interest-label">
                ${job.salary}
              </span>

            </div>

            <p>
              ⌾ ${job.location}
            </p>

            <div class="profile-job-tags">

              <span>${job.mode}</span>

              <span>${job.experience}</span>

              ${job.skills.map(skill =>
                `<span>${skill}</span>`
              ).join("")}

            </div>

          </article>

        `).join("");

    }

    loadEmployerProfile();

  </script>

</body>

</html>
