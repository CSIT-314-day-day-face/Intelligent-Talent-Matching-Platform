<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page candidate-page">

    <header class="emp-topbar">
      <div class="emp-logo-box"></div>

      <div class="emp-nav-right">
        <div class="user-icon"></div>
        <button class="signin-btn">Name</button>
      </div>
    </header>

    <main class="candidate-profile-content">

      <section class="candidate-left">
        <div class="candidate-info-row">
          <div class="candidate-avatar"></div>

          <div class="candidate-text">
            <h1>Name</h1>
            <p>age</p>
            <p>Preferred Location</p>
            <p>Preferred Mode</p>
            <p>Email</p>
          </div>
        </div>

        <div class="candidate-skills">
          <h3>Skills:</h3>

          <div class="skill-row">
            <span></span>
            <span></span>
          </div>

          <div class="skill-row">
            <span></span>
            <span></span>
          </div>

          <div class="skill-add">＋</div>
        </div>
      </section>

      <section class="candidate-right">
        <div class="candidate-summary-head">
          <h3>Summary:</h3>
          <button class="emp-vip-btn">Vip</button>
        </div>

        <div class="summary-box"></div>

        <h3 class="work-title">Work Experience:</h3>

        <div class="experience-box"></div>
        <div class="experience-box"></div>
        <div class="experience-box"></div>
      </section>

    </main>

  </div>
</body>
</html>
