<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOB RADAR</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <header class="navbar">
      <div class="logo">
        <span>Job</span>
        <strong>Radar</strong>
      </div>

      <div class="nav-right">
        <a href="profile.html">
          <div class="user-icon"></div>
        </a>

        <a href="login.html">
          <button class="signin-btn">Sign in</button>
        </a>
      </div>
    </header>

    <section class="search-area">

  <select class="search-filter" name="searchType">
    <option value="location">Location</option>
    <option value="salary">Salary</option>
    <option value="company">Company Name</option>
    <option value="position">Job Position</option>
  </select>

  <input
    class="search-input"
    type="text"
    placeholder="Enter company name or Job Position"
  >

  <button class="search-btn">
    Search
  </button>

</section>

    <main class="main-content">

      <section class="recommended-section">
        <h1>Recommended</h1>

        <p>
          Please <a href="login.html">sign in</a> and complete your
          <a class="profile-link" href="profile.html">profile</a>
          to view recommendations
        </p>
      </section>

      <aside class="side-panel">

        <section class="saved-section">
          <h3>Saved Searches</h3>

          <div class="empty-box">
            You can view your previous search history here.
          </div>
        </section>

        <section class="saved-section">
          <h3>Saved Jobs</h3>

          <div class="empty-box">
            You can view your saved jobs here.
          </div>
        </section>

      </aside>

    </main>

  </div>

</body>

</html>
