<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>JOB RADAR</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- Top Navigation Bar -->
    <header class="navbar">

      <div class="logo">Job <b>Radar</div>

      <div class="nav-right">
        <a href="profile.html"><div class="user-icon"></div></a>
        <button class="signin-btn">Sign in</button>
      </div>

    </header>

    <!-- Search Area -->
    <section class="search-area">

      <input
        class="search-input"
        type="text"
        placeholder="Enter company name or Job Position"
      >

      <button class="search-btn">Search</button>

    </section>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Recommended Area -->
      <section class="recommended-section">

        <h1>Recommended</h1>

        <p>
          Please  <a href="login.html">sign in</a> and complete your <span>profile</span>
          to view recommendations
        </p>

      </section>

      <!-- Right Side Area -->
      <aside class="side-panel">

        <section class="saved-section">
          <h3>Saved Searches</h3>

          <div class="empty-box">
            You can view your previous search history here.
          </div>
        </section>

        <section class="saved-section">
          <h3>Saved Jobs</h3>

          <div class="empty-box">
            You can view your saved jobs here.
          </div>
        </section>

      </aside>

    </main>

  </div>

</body>
</html>
