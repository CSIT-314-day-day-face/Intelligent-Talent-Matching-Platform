<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOB RADAR</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <header class="navbar">
      <div class="logo">
        <span>Job</span>
        <strong>Radar</strong>
      </div>

      <div class="nav-right">
        <a href="SignIn.html">
          <div class="user-icon"></div>
        </a>

        <a href="SignIn.html">
          <button class="signin-btn">Sign in</button>
        </a>
      </div>
    </header>

    <section class="search-area">

      <select class="search-filter" name="searchType">
        <option value="location">Location</option>
        <option value="salary">Salary</option>
        <option value="company">Company Name</option>
        <option value="position">Job Position</option>
      </select>

      <input
        class="search-input"
        type="text"
        placeholder="Enter company name or Job Position"
      >

      <button class="search-btn">
        Search
      </button>

    </section>

    <main class="main-content">

      <section class="recommended-section">
        <h1>Recommended</h1>

        <p>
          Please <a href="SignIn.html">sign in</a> and complete your
          profile to view recommendations
        </p>
      </section>

    </main>

  </div>

</body>

</html>
