<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Search Results | Job Radar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="results-page">

    <header class="results-navbar">

      <a href="index.html" class="logo-link" onclick="goHome(event)">
        <div class="results-logo">
          Job Radar
        </div>
      </a>

      <div
        class="results-user"
        id="resultsUserName"
      >
        Guest
      </div>

    </header>

    <section class="results-search-wrapper">

      <div class="results-search-box">

        <select class="search-select" id="searchTarget">
          <option value="jobs">Jobs</option>
          <option value="candidates">Candidates</option>
        </select>

        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search jobs by title or skill"
        >

        <button
          class="search-btn"
          onclick="searchAgain()"
        >
          Search
        </button>

      </div>

      <div class="results-filter-panel" id="resultsFilterPanel">
        <div class="results-filter-heading">
          <strong>Filters</strong>
          <span id="filterHint">Combine keyword and filters for better matching.</span>
        </div>

        <div class="results-filter-grid" id="resultsFilterGrid"></div>
      </div>

    </section>

    <main class="results-main">

      <div class="results-title-row">

        <div>
          <h1>Search Results</h1>
          <p>
            Found
            <span id="resultKeyword">0</span>
            matching results for you
          </p>
        </div>

        <div class="sort-box">
          Sort by: <strong>Most Relevant</strong>⌄
        </div>

      </div>

      <section
        class="results-list"
        id="resultsContainer"
      ></section>

      <div class="pagination">

        <button onclick="changePage(-1)">
          ‹
        </button>

        <div id="pageNumbers"></div>

        <button onclick="changePage(1)">
          ›
        </button>

      </div>

    </main>

    <footer class="results-footer">

      <div>
        <strong>Job Radar</strong>
        <p>© 2024 Job Radar. All rights reserved.</p>
      </div>

      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Cookie Policy</a>
        <a href="#">Contact Support</a>
      </div>

    </footer>

  </div>

  <script src="api.js"></script>
  <script>
    const resultsUserName =
      document.getElementById("resultsUserName");

    const auth = getLoginState();
    renderUserMenu(
      resultsUserName,
      auth.role === "employer" ? "employer-profile.html" : "candidate-profile.html"
    );

    const searchTarget = document.getElementById("searchTarget");
    const searchInput = document.getElementById("searchInput");
    const resultsFilterGrid = document.getElementById("resultsFilterGrid");
    const filterHint = document.getElementById("filterHint");

    let currentPage = 1;
    const resultsPerPage = 4;
    let allResults = [];

    const params = new URLSearchParams(window.location.search);
    let target = params.get("target") || "jobs";
    if (target === "candidates" && auth.role !== "employer") {
      target = "jobs";
    }
    const legacyKeyword = params.get("keyword") || "";
    const legacyType = params.get("type") || "keyword";

    const filterConfigs = {
      jobs: [
        { id: "location", label: "Location", type: "text", placeholder: "Sydney" },
        { id: "work_mode", label: "Work Mode", type: "select", options: ["", "Remote", "On-site", "Hybrid"] },
        { id: "job_type", label: "Job Type", type: "select", options: ["", "Full-time", "Part-time", "Contract", "Internship"] },
        { id: "salary", label: "Minimum Salary", type: "select", options: ["", "$10k+", "$20k+", "$30k+", "$40k+", "$50k+", "$60k+", "$70k+", "$80k+", "$90k+", "$100k+", "$125k+", "$150k+"] },
        { id: "education", label: "Minimum Education Requirement", type: "select", options: ["", "High School", "Certificate", "Diploma", "Bachelor", "Master", "PhD", "Equivalent experience"] },
        { id: "skill", label: "Skill", type: "text", placeholder: "Python" }
      ],
      candidates: [
        { id: "location", label: "Preferred Location", type: "text", placeholder: "Sydney" },
        { id: "work_mode", label: "Preferred Work Mode", type: "select", options: ["", "Remote", "On-site", "Hybrid"] },
        { id: "education", label: "Minimum Education", type: "select", options: ["", "High School", "Certificate", "Diploma", "Bachelor", "Master", "PhD"] },
        { id: "skill", label: "Skill", type: "text", placeholder: "Python" },
        { id: "experience", label: "Experience", type: "select", options: ["", "0-3 Years", "3-5 Years", "5-7 Years", "7-9 Years", "9-11 Years", "11+ Years"] }
      ]
    };

    function normalizeLegacyParams() {
      const query = new URLSearchParams();
      if (params.get("q")) {
        query.set("q", params.get("q"));
      } else if (legacyType === "keyword" && legacyKeyword) {
        query.set("q", legacyKeyword);
      }

      const legacyMap = {
        location: "location",
        workmode: "work_mode",
        salary: target === "jobs" ? "salary" : "q",
        skill: "skill",
        education: "education",
        experience: "experience",
        job_type: "job_type"
      };

      const mappedKey = legacyMap[legacyType];
      if (mappedKey && legacyKeyword) {
        query.set(mappedKey, legacyKeyword);
      }

      filterConfigs[target].forEach(config => {
        const value = params.get(config.id);
        if (value) {
          query.set(config.id, value);
        }
      });

      return query;
    }

    let searchValues = normalizeLegacyParams();

    function renderFilterControl(config) {
      const value = searchValues.get(config.id) || "";
      if (config.type === "select") {
        const options = config.options.map(option => `
          <option value="${option}" ${option === value ? "selected" : ""}>
            ${option || "Any"}
          </option>
        `).join("");

        return `
          <label class="results-filter-field">
            <span>${config.label}</span>
            <select data-filter="${config.id}">
              ${options}
            </select>
          </label>
        `;
      }

      return `
        <label class="results-filter-field">
          <span>${config.label}</span>
          <input
            type="text"
            data-filter="${config.id}"
            value="${value}"
            placeholder="${config.placeholder || ""}"
          >
        </label>
      `;
    }

    function renderFilters() {
      searchTarget.value = target;
      searchInput.value = searchValues.get("q") || "";
      searchInput.placeholder = target === "candidates"
        ? "Search candidate skills, education, or experience"
        : "Search jobs by title, company, description, or skill";

      filterHint.textContent = target === "candidates"
        ? "Search candidate profiles by keyword and filters."
        : "Search job and company profiles by keyword and filters.";

      resultsFilterGrid.innerHTML =
        filterConfigs[target].map(renderFilterControl).join("");
    }

    function collectSearchValues() {
      const values = new URLSearchParams();
      const keyword = searchInput.value.trim();
      if (keyword) {
        values.set("q", keyword);
      }

      resultsFilterGrid.querySelectorAll("[data-filter]").forEach(field => {
        const value = field.value.trim();
        if (value) {
          values.set(field.dataset.filter, value);
        }
      });

      return values;
    }

    function buildApiPath() {
      const endpoint = target === "candidates"
        ? "/candidates/search"
        : "/search";
      const query = collectSearchValues();
      const queryString = query.toString();
      return queryString ? `${endpoint}?${queryString}` : endpoint;
    }

    function runSearch() {
      apiRequest(buildApiPath())
      .then(data => {
        allResults = data.results || [];

        document.getElementById("resultKeyword").textContent =
          data.count || allResults.length;

        if (allResults.length === 0) {
          document.getElementById("resultsContainer").innerHTML = `
            <div class="no-results">
              No matching results found.
            </div>
          `;

          document.getElementById("pageNumbers").innerHTML = "";
          return;
        }

        renderPage(1);
        renderPagination();
      })
      .catch(error => {
        console.error("Search error:", error);

        document.getElementById("resultsContainer").innerHTML = `
          <div class="no-results">
            Search failed. Please make sure the backend is running.
          </div>
        `;
      });
    }

    renderFilters();
    bindEnterKey([
      "#searchTarget",
      "#searchInput",
      "#resultsFilterGrid input",
      "#resultsFilterGrid select"
    ], searchAgain);
    runSearch();

    searchTarget.addEventListener("change", function () {
      target = this.value;
      searchValues = new URLSearchParams();
      renderFilters();
      bindEnterKey([
        "#resultsFilterGrid input",
        "#resultsFilterGrid select"
      ], searchAgain);
    });

    function renderPage(page) {
      currentPage = page;

      const resultsContainer =
        document.getElementById("resultsContainer");

      resultsContainer.innerHTML = "";

      const start = (page - 1) * resultsPerPage;
      const end = start + resultsPerPage;

      const jobsToShow =
        allResults.slice(start, end);

      jobsToShow.forEach(item => {
        if (target === "candidates") {
          resultsContainer.innerHTML += `
          <article class="result-card">
            <div class="result-content">
              <h3>
                ${item.full_name || item.name || "Unnamed Candidate"}
              </h3>

              <p>
                ${item.education || ""} ${item.major || ""}
              </p>

              <div class="tags">
                <span>${item.preferred_mode || ""}</span>
                <span>${item.preferred_location || item.location || ""}</span>
                <span>${Math.round(item.score || 0)}% Match</span>
              </div>

              <div class="card-bottom">
                <small>${item.skills || ""}</small>
                <a href="candidate-detail.html?id=${item.id}">
                  View Profile
                </a>
              </div>
            </div>
          </article>
          `;
          return;
        }

        const job = item;
        const scoreText = Number(job.score || 0) > 0
          ? `${Math.round(job.score)}% Match`
          : "Job Listing";
        resultsContainer.innerHTML += `
          <article class="result-card">

            <div class="result-icon red-bg">
              ◎
            </div>

            <div class="result-content">

              <h3>
                ${job.title}
              </h3>

              <p>
                ${job.location} - ${job.work_mode || job.job_type || ""}
              </p>

              <div class="tags">
                <span>${job.work_mode || job.job_type || ""}</span>
                <span>${job.salary}</span>
                <span>${scoreText}</span>
              </div>

              <div class="card-bottom">
                <small>AI matched result</small>
                <a href="job-detail.html?id=${job.id}">
                  Details →
                </a>
              </div>

            </div>

            <button class="save-btn">
              ♡
            </button>

          </article>
        `;
      });

      renderPagination();
    }

    function renderPagination() {
      const totalPages =
        Math.ceil(allResults.length / resultsPerPage);

      const pageNumbers =
        document.getElementById("pageNumbers");

      pageNumbers.innerHTML = "";

      for (let i = 1; i <= totalPages; i++) {
        pageNumbers.innerHTML += `
          <button
            class="${i === currentPage ? "active-page" : ""}"
            onclick="renderPage(${i})"
          >
            ${i}
          </button>
        `;
      }
    }

    function changePage(direction) {
      const totalPages =
        Math.ceil(allResults.length / resultsPerPage);

      const nextPage =
        currentPage + direction;

      if (nextPage < 1 || nextPage > totalPages) {
        return;
      }

      renderPage(nextPage);
    }

    function searchAgain() {
      const values = collectSearchValues();

      window.location.href =
        "search-results.html?target="
        + encodeURIComponent(target)
        + (values.toString() ? "&" + values.toString() : "");
    }
  </script>

</body>

</html>
