<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Search Results | Job Radar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="results-page">

    <header class="results-navbar">

      <a href="index.html" class="logo-link" onclick="goHome(event)">
        <div class="results-logo">
          Job Radar
        </div>
      </a>

      <div
        class="results-user"
        id="resultsUserName"
      >
        Guest
      </div>

    </header>

    <section class="results-search-wrapper">

      <div class="results-search-box">

        <select class="search-select" id="searchType">
          <option value="keyword">Keyword</option>
          <option value="location">Address</option>
          <option value="workmode">Work Mode</option>
          <option value="salary">Salary</option>
        </select>

        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search jobs by title or skill"
        >

        <button
          class="search-btn"
          onclick="searchAgain()"
        >
          Search
        </button>

      </div>

    </section>

    <main class="results-main">

      <div class="results-title-row">

        <div>
          <h1>Search Results</h1>
          <p>
            Found
            <span id="resultKeyword">0</span>
            matching results for you
          </p>
        </div>

        <div class="sort-box">
          Sort by: <strong>Most Relevant</strong>⌄
        </div>

      </div>

      <section
        class="results-list"
        id="resultsContainer"
      ></section>

      <div class="pagination">

        <button onclick="changePage(-1)">
          ‹
        </button>

        <div id="pageNumbers"></div>

        <button onclick="changePage(1)">
          ›
        </button>

      </div>

    </main>

    <footer class="results-footer">

      <div>
        <strong>Job Radar</strong>
        <p>© 2024 Job Radar. All rights reserved.</p>
      </div>

      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Cookie Policy</a>
        <a href="#">Contact Support</a>
      </div>

    </footer>

  </div>

  <script src="api.js"></script>
  <script>
    const resultsUserName =
      document.getElementById("resultsUserName");

    const auth = getLoginState();
    renderUserMenu(
      resultsUserName,
      auth.role === "employer" ? "employer-profile.html" : "candidate-profile.html"
    );

    const searchType = document.getElementById("searchType");
    const searchInput = document.getElementById("searchInput");

    let currentPage = 1;
    const jobsPerPage = 4;
    let allResults = [];

    searchType.addEventListener("change", function () {
      if (this.value === "keyword") {
        searchInput.placeholder = "Search jobs by title or skill";
      }

      if (this.value === "location") {
        searchInput.placeholder = "Enter your preferred work address";
      }

      if (this.value === "workmode") {
        searchInput.placeholder = "Remote, Hybrid, or On-site";
      }

      if (this.value === "salary") {
        searchInput.placeholder = "Enter your expected salary";
      }
    });

    const params = new URLSearchParams(window.location.search);
    const keyword = params.get("keyword") || "";
    const type = params.get("type") || "keyword";
    const target = params.get("target") || "jobs";

    searchInput.value = keyword;
    searchType.value = type;

    let apiUrl = target === "candidates"
      ? `${API_BASE}/candidates/search?`
      : `${API_BASE}/search?`;

    if (type === "location") {
      apiUrl += "location=" + encodeURIComponent(keyword);
    } else if (type === "workmode") {
      apiUrl += "work_mode=" + encodeURIComponent(keyword);
    } else if (type === "salary") {
      apiUrl += target === "candidates"
        ? "q=" + encodeURIComponent(keyword)
        : "salary=" + encodeURIComponent(keyword);
    } else {
      apiUrl += "q=" + encodeURIComponent(keyword);
    }

    fetch(apiUrl, {
      method: "GET",
      credentials: "include"
    })
      .then(response => response.json())
      .then(data => {
        allResults = data.results || [];

        document.getElementById("resultKeyword").textContent =
          data.count || allResults.length;

        if (allResults.length === 0) {
          document.getElementById("resultsContainer").innerHTML = `
            <div class="no-results">
              No matching results found.
            </div>
          `;

          document.getElementById("pageNumbers").innerHTML = "";
          return;
        }

        renderPage(1);
        renderPagination();
      })
      .catch(error => {
        console.error("Search error:", error);

        document.getElementById("resultsContainer").innerHTML = `
          <div class="no-results">
            Search failed. Please make sure the backend is running.
          </div>
        `;
      });

    function renderPage(page) {
      currentPage = page;

      const resultsContainer =
        document.getElementById("resultsContainer");

      resultsContainer.innerHTML = "";

      const start = (page - 1) * jobsPerPage;
      const end = start + jobsPerPage;

      const jobsToShow =
        allResults.slice(start, end);

      jobsToShow.forEach(item => {
        if (target === "candidates") {
          resultsContainer.innerHTML += `
          <article class="result-card">
            <div class="result-content">
              <h3>
                ${item.full_name || item.name || "Unnamed Candidate"}
              </h3>

              <p>
                ${item.education || ""} ${item.major || ""}
              </p>

              <div class="tags">
                <span>${item.preferred_mode || ""}</span>
                <span>${item.preferred_location || item.location || ""}</span>
                <span>${Math.round(item.score || 0)}% Match</span>
              </div>

              <div class="card-bottom">
                <small>${item.skills || ""}</small>
                <a href="candidate-detail.html?id=${item.id}">
                  View Profile
                </a>
              </div>
            </div>
          </article>
          `;
          return;
        }

        const job = item;
        resultsContainer.innerHTML += `
          <article class="result-card">

            <div class="result-icon red-bg">
              ◎
            </div>

            <div class="result-content">

              <h3>
                ${job.title}
              </h3>

              <p>
                ${job.location} - ${job.work_mode || job.job_type || ""}
              </p>

              <div class="tags">
                <span>${job.work_mode || job.job_type || ""}</span>
                <span>${job.salary}</span>
                <span>${job.score}% Match</span>
              </div>

              <div class="card-bottom">
                <small>AI matched result</small>
                <a href="job-detail.html?id=${job.id}">
                  Details →
                </a>
              </div>

            </div>

            <button class="save-btn">
              ♡
            </button>

          </article>
        `;
      });

      renderPagination();
    }

    function renderPagination() {
      const totalPages =
        Math.ceil(allResults.length / jobsPerPage);

      const pageNumbers =
        document.getElementById("pageNumbers");

      pageNumbers.innerHTML = "";

      for (let i = 1; i <= totalPages; i++) {
        pageNumbers.innerHTML += `
          <button
            class="${i === currentPage ? "active-page" : ""}"
            onclick="renderPage(${i})"
          >
            ${i}
          </button>
        `;
      }
    }

    function changePage(direction) {
      const totalPages =
        Math.ceil(allResults.length / jobsPerPage);

      const nextPage =
        currentPage + direction;

      if (nextPage < 1 || nextPage > totalPages) {
        return;
      }

      renderPage(nextPage);
    }

    function searchAgain() {
      const type = searchType.value;
      const keyword = searchInput.value.trim();

      window.location.href =
        "search-results.html?target="
        + encodeURIComponent(target)
        + "&type="
        + encodeURIComponent(type)
        + "&keyword="
        + encodeURIComponent(keyword);
    }
  </script>

</body>

</html>
