<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Candidate Sign Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="signup-page">

    <a
      href="index.html"
      class="signup-logo"
      onclick="goHome(event)"
    >
      Job Radar
    </a>

    <main class="signup-main">

      <section class="signup-card">

        <h1>
          Candidate Sign Up
        </h1>

        <form>



          <label>
            Name
          </label>

          <div class="signup-input">

            <span>♙</span>

            <input
              id="nameInput"
              type="text"
              placeholder="Firstname + Lastname"
            >

          </div>



          <label>
            Work Email
          </label>

          <div class="signup-input">

            <span>✉</span>

            <input
              id="emailInput"
              type="email"
              placeholder="name@company.com"
            >

          </div>



          <label>
            Password
          </label>

          <div class="signup-input">

            <span>▣</span>

            <input
              id="passwordInput"
              type="password"
              maxlength="8"
              placeholder="Min. 8 characters"
            >

          </div>



          <button
            type="button"
            onclick="registerCandidate()"
          >
            Sign Up
          </button>



          <p class="login-link">

            Already have an account?

            <a href="login.html">
              Log In
            </a>

          </p>



          <a
            href="employer-register.html"
            class="switch-link"
          >
            Register as Employer →
          </a>

        </form>

      </section>

    </main>

    <footer class="signup-footer">

      <div>

        <strong>
          Job Radar
        </strong>

        <p>
          © 2024 Job Radar. All rights reserved.
        </p>

      </div>

      <div class="signup-footer-links">

        <a href="#">
          Privacy Policy
        </a>

        <a href="#">
          Terms of Service
        </a>

        <a href="#">
          About Us
        </a>

      </div>

    </footer>

  </div>

  <script src="api.js"></script>
  <script>

    function registerCandidate() {

      const name =
        document.getElementById("nameInput")
        .value.trim();

      const email =
        document.getElementById("emailInput")
        .value.trim();

      const password =
        document.getElementById("passwordInput")
        .value.trim();

      if (
        !name ||
        !email ||
        !password
      ) {

        alert(
          "Please complete all fields."
        );

        return;

      }

      if (password.length < 8) {

        alert(
          "Password must be 8 characters."
        );

        return;

      }

      apiRequest("/register", {
        method: "POST",
        body: {
          email: email,
          password: password,
          role: "candidate",
          full_name: name,
          contact_info: email
        }
      })

      .then(data => {

        if (
          data.status === "success"
        ) {

          localStorage.setItem(
            "userName",
            name
          );
          clearLoginState();
          window.location.href = "login.html";

        }

        else {

          alert(
            data.message ||
            "Registration failed."
          );

        }

      })

      .catch(error => {

        console.error(
          "Register error:",
          error
        );

        alert(
          "Cannot connect to backend."
        );

      });

    }

  </script>

</body>

</html>
