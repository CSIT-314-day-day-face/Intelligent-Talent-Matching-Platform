<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="signin-page">

    <header class="signin-header">
      <div class="logo">
        <span>Job</span>
        <strong>Radar</strong>
      </div>
    </header>

    <main class="signin-content">

      <h1>Register as an Candidate</h1>

      <label>Email address:</label>
      <input type="email">

      <label>Password:</label>
      <input type="password">

      <button class="red-main-btn">Register as an Candidate</button>

      <div class="bottom-links">
        <span>Already have an account? <a href="SignIn.html">Log in</a></span>
        <span>If you are an employer, please <a href="employer-register.html">click here.</a></span>
      </div>

    </main>

  </div>

</body>

</html>
