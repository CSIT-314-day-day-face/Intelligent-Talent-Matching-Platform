<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Job</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="post-job-page">

    <header class="post-job-navbar">

      <a href="index.html" class="post-job-logo" onclick="goHome(event)">
        Job Radar
      </a>

      <div class="post-job-nav-actions">
        <a href="employer-profile.html" class="post-job-user" id="postJobUserName">
          Employer
        </a>
        <button type="button" class="logout-btn" onclick="logoutUser()">
          Logout
        </button>
      </div>

    </header>

    <main class="post-job-main">

      <h1>Post a New Job</h1>

      <p class="post-job-subtitle">
        Find the perfect candidate with precision matching on Job Radar.
      </p>

      <section class="post-job-card">

        <form>

          <div class="post-form-grid">

            <div class="post-field">
              <label>Job Title <span>*</span></label>
              <input id="jobTitleInput" type="text" placeholder="Senior Software Engineer">
            </div>

            <div class="post-field">
              <label>Location <span>*</span></label>
              <input id="jobLocationInput" type="text" placeholder="City, Country">
            </div>

            <div class="post-field">
              <label>Work Mode <span>*</span></label>
              <select id="jobModeInput">
                <option value="Remote">Remote</option>
                <option value="On-site">On-site</option>
                <option value="Hybrid">Hybrid</option>
              </select>
            </div>

            <div class="post-field">
              <label>Salary Range <span>*</span></label>
              <select id="jobSalaryInput">
                <option value="">Select Salary Range</option>
                <option value="$10k - $20k">$10k - $20k</option>
                <option value="$20k - $30k">$20k - $30k</option>
                <option value="$30k - $40k">$30k - $40k</option>
                <option value="$40k - $50k">$40k - $50k</option>
                <option value="$50k - $60k">$50k - $60k</option>
                <option value="$60k - $70k">$60k - $70k</option>
                <option value="$70k - $80k">$70k - $80k</option>
                <option value="$80k - $90k">$80k - $90k</option>
                <option value="$90k - $100k">$90k - $100k</option>
                <option value="$100k - $110k">$100k - $110k</option>
              </select>
            </div>

            <div class="post-field">
              <label>Job Type <span>*</span></label>
              <select id="jobTypeInput">
                <option value="">Select Job Type</option>
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
                <option value="Contract">Contract</option>
                <option value="Internship">Internship</option>
              </select>
            </div>

            <div class="post-field">
              <label>Required Education <span>*</span></label>
              <select id="jobEducationInput">
                <option value="">Select Education</option>
                <option value="High School">High School</option>
                <option value="Certificate">Certificate</option>
                <option value="Diploma">Diploma</option>
                <option value="Bachelor">Bachelor</option>
                <option value="Master">Master</option>
                <option value="PhD">PhD</option>
                <option value="Equivalent experience">Equivalent experience</option>
              </select>
            </div>

          </div>

          <div class="post-field post-field-full">
            <label>Job Description <span>*</span></label>
            <textarea
              id="jobDescriptionInput"
              placeholder="Describe the role, responsibilities, team, and hiring expectations"
            ></textarea>
          </div>

          <div class="post-tag-section">

            <label>Required Experience <span>*</span></label>

            <div class="post-tags">
              <button type="button" class="post-tag experience-tag" data-value="0-3 Years">0-3 Years</button>
              <button type="button" class="post-tag experience-tag" data-value="3-5 Years">3-5 Years</button>
              <button type="button" class="post-tag experience-tag" data-value="5-7 Years">5-7 Years</button>
              <button type="button" class="post-tag experience-tag" data-value="7-9 Years">7-9 Years</button>
              <button type="button" class="post-tag experience-tag" data-value="9-11 Years">9-11 Years</button>
              <button type="button" class="post-tag experience-tag" data-value="11+ Years">11+ Years</button>
            </div>

          </div>

          <div class="post-tag-section">

            <label>Required Skills <span>*</span></label>

            <div class="post-tags">
              <button type="button" class="post-tag skill-tag" data-value="React">React</button>
              <button type="button" class="post-tag skill-tag" data-value="TypeScript">TypeScript</button>
              <button type="button" class="post-tag skill-tag" data-value="Node.js">Node.js</button>
              <button type="button" class="post-tag skill-tag" data-value="Python">Python</button>
              <button type="button" class="post-tag skill-tag" data-value="AWS">AWS</button>
              <button type="button" class="post-tag skill-tag" data-value="Docker">Docker</button>
              <button type="button" class="post-tag skill-tag" data-value="Figma">Figma</button>
              <button type="button" class="post-tag skill-tag" data-value="Java">Java</button>
              <button type="button" class="post-tag skill-tag" data-value="C++">C++</button>
              <button type="button" class="post-tag skill-tag" data-value="SQL">SQL</button>
              <button type="button" class="post-tag skill-tag" data-value="Go">Go</button>
              <button type="button" class="post-tag skill-tag" data-value="Kubernetes">Kubernetes</button>
              <button type="button" class="post-tag skill-tag" data-value="Swift">Swift</button>
              <button type="button" class="post-tag skill-tag" data-value="Kotlin">Kotlin</button>
              <button type="button" class="post-tag skill-tag" data-value="Vue.js">Vue.js</button>
              <button type="button" class="post-tag skill-tag" data-value="Angular">Angular</button>
            </div>

          </div>

          <div class="post-divider"></div>

          <div class="post-actions">
            <button type="button" class="post-submit-btn" onclick="saveJob()">
              ◎ Post Job
            </button>
          </div>

        </form>

      </section>

    </main>

    <footer class="post-job-footer">

      <div>
        <strong>Job Radar</strong>
        <p>© 2024 Job Radar. All rights reserved.</p>
      </div>

      <div class="post-job-footer-links">
        <a href="#">Support</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Cookie Settings</a>
      </div>

    </footer>

  </div>

  <script src="api.js"></script>
  <script>
    const postJobUserName = document.getElementById("postJobUserName");
    const auth = getLoginState();
    postJobUserName.textContent =
      auth.name || auth.email || "Employer";

    let selectedExperience = "";
    let selectedSkills = [];

    const experienceTags = document.querySelectorAll(".experience-tag");
    const skillTags = document.querySelectorAll(".skill-tag");

    experienceTags.forEach(tag => {
      tag.addEventListener("click", () => {
        experienceTags.forEach(item => item.classList.remove("selected"));
        tag.classList.add("selected");
        selectedExperience = tag.dataset.value;
      });
    });

    skillTags.forEach(tag => {
      tag.addEventListener("click", () => {
        const skill = tag.dataset.value;

        if (tag.classList.contains("selected")) {
          tag.classList.remove("selected");
          selectedSkills = selectedSkills.filter(item => item !== skill);
          return;
        }

        if (selectedSkills.length >= 6) {
          alert("You can select up to 6 skills only.");
          return;
        }

        tag.classList.add("selected");
        selectedSkills.push(skill);
      });
    });

    async function saveJob() {
      const title = document.getElementById("jobTitleInput").value.trim();
      const location = document.getElementById("jobLocationInput").value.trim();
      const mode = document.getElementById("jobModeInput").value;
      const salary = document.getElementById("jobSalaryInput").value.trim();
      const jobType = document.getElementById("jobTypeInput").value.trim();
      const requiredEducation = document.getElementById("jobEducationInput").value.trim();
      const description = document.getElementById("jobDescriptionInput").value.trim();

      if (!title || !location || !mode || !salary || !jobType || !requiredEducation || !description) {
        alert("Please fill in all job information.");
        return;
      }

      if (!selectedExperience) {
        alert("Please select one required experience.");
        return;
      }

      if (selectedSkills.length === 0) {
        alert("Please select at least one required skill.");
        return;
      }

      const employerProfile =
        JSON.parse(localStorage.getItem("employerProfile")) || {};

      const newJob = {
        title: title,
        location: location,
        work_mode: mode,
        mode: mode,
        salary: salary,
        description: description,
        required_education: requiredEducation,
        job_type: jobType,
        experience: selectedExperience,
        years_experience: selectedExperience,
        required_skills: selectedSkills,
        skills: selectedSkills,
        companyName: employerProfile.companyName || "Company Name"
      };

      try {
        await apiRequest("/jobs", {
          method: "POST",
          body: {
            title: newJob.title,
            location: newJob.location,
            work_mode: newJob.work_mode,
            salary: newJob.salary,
            description: newJob.description,
            required_education: newJob.required_education,
            required_skills: newJob.required_skills,
            years_experience: newJob.years_experience,
            job_type: newJob.job_type,
            company_info: employerProfile.companyInfo || employerProfile.companyName || ""
          }
        });

        window.location.href = "employer-profile.html";
      } catch (error) {
        alert(error.message || "Job posting failed. Please log in as an employer.");
      }
    }

    bindEnterKey([
      "#jobTitleInput",
      "#jobLocationInput",
      "#jobModeInput",
      "#jobSalaryInput",
      "#jobTypeInput",
      "#jobEducationInput"
    ], saveJob);
  </script>

</body>

</html>
