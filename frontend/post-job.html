<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Job</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page emp-page">

    <header class="emp-topbar">
      <div class="emp-logo-box"></div>

      <div class="emp-nav-right">
        <div class="user-icon"></div>
        <button class="signin-btn">Name</button>
      </div>
    </header>

    <main class="emp-profile-content">

      <section class="emp-left">
        <div class="emp-info-row">
          <div class="emp-avatar"></div>

          <div class="emp-text">
            <h1>Name</h1>
            <p>age</p>
            <p>CP Location</p>
            <p>Email</p>
          </div>
        </div>

        <div class="emp-publish">
          <h3>Publish Job :</h3>
          <div class="emp-input-box"></div>
          <div class="emp-input-box"></div>
          <div class="emp-input-box"></div>
          <div class="emp-add-btn">＋</div>
        </div>
      </section>

      <section class="emp-right">
        <div class="emp-summary-head">
          <h3>CP Summary:</h3>
          <button class="emp-vip-btn">Vip</button>
        </div>

        <div class="emp-bottom-cards">
          <div class="emp-small-card"></div>
          <div class="emp-small-card"></div>
        </div>
      </section>

      <section class="job-modal">
        <div class="job-row">
          <strong>Job Title :</strong>
          <div class="job-line"></div>
        </div>

        <div class="job-row">
          <strong>Job Location :</strong>
          <div class="job-line"></div>
        </div>

        <div class="job-description">
          <strong>Job Description :</strong>
          <div class="job-desc-box"></div>
        </div>

        <div class="job-tags">
          <strong>Tag :</strong>
          <span>Education</span>
          <span>Skills</span>
          <span>Work Experience</span>
        </div>

        <div class="tag-placeholders">
          <div></div>
          <div></div>
          <div></div>
        </div>

        <div class="tag-add">＋</div>
      </section>

    </main>

  </div>
</body>
</html>
